name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required by Kotlin + Gradle 8.9)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Download gradle-wrapper.jar (not committed to git)
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar"

      # 5. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 6. Cache Gradle — speeds up future builds significantly
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Build debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.txt

      # 7b. Upload build log on failure
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.txt
          retention-days: 7

      # 8. Upload APK as downloadable artifact (available for 30 days)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaTrimmer-debug-${{ github.run_number }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: error
